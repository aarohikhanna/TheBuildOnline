<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      .bg-light { fill: #FDFBF7; }
      .bubble-outline { stroke: #0F172A; stroke-width: 14; stroke-linecap: round; fill: none; stroke-linejoin: round; }
      .stairs { stroke: #D97706; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .flag { fill: #D97706; }
      .mic-body { fill: #0F172A; }
      .mic-lines { stroke: #FDFBF7; stroke-width: 4; stroke-linecap: round; }
      .mic-stand { stroke: #0F172A; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <!-- Speech Bubble Outline (Two main arcs with a gap for the stairs on the top-right and a tail at bottom-left) -->
  <path class="bubble-outline" d="M 285,100 C 180,95 90,175 90,270 C 90,320 110,360 140,390 L 115,445 L 190,425 C 210,432 230,435 250,435 C 340,435 415,365 419,275" />

  <!-- The Ascending Stairs (Startup Journey) climbing out of the bubble -->
  <path class="stairs" d="M 250,230 L 285,230 L 285,190 L 325,190 L 325,150 L 365,150 L 365,110 L 405,110" />

  <!-- Flag at the top of the stairs -->
  <polygon class="flag" points="405,110 405,65 445,80 405,95" />
  <line x1="405" y1="95" x2="405" y2="110" stroke="#D97706" stroke-width="6" stroke-linecap="round" />

  <!-- Vintage Microphone -->
  <!-- Stand base -->
  <path class="mic-stand" d="M 250,310 L 250,370 M 210,375 L 290,375" />
  <!-- U-shape Holder -->
  <path class="mic-stand" d="M 205,250 C 205,320 295,320 295,250" />
  
  <!-- Capsule (Body) -->
  <rect class="mic-body" x="222" y="170" width="56" height="100" rx="28" />
  <!-- Grills / Details on microphone -->
  <line class="mic-lines" x1="232" y1="190" x2="268" y2="190" />
  <line class="mic-lines" x1="230" y1="205" x2="270" y2="205" />
  <line class="mic-lines" x1="230" y1="220" x2="270" y2="220" />
  <line class="mic-lines" x1="232" y1="235" x2="268" y2="235" />
  <!-- Vertical center stripe -->
  <line class="mic-lines" x1="250" y1="180" x2="250" y2="255" />
</svg>
